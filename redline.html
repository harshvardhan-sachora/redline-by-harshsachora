<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redline — AI text editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --shell-bg: #20242a;
    --shell-edge: #2c3138;
    --paper: #e9e4d3;
    --paper-edge: #d9d0b8;
    --ink: #2a2620;
    --ink-soft: #6b6455;
    --redpen: #c23b2e;
    --redpen-soft: rgba(194,59,46,0.12);
    --teal: #2f7b6e;
    --teal-hi: #3b9686;
    --shell-text: #e7e4dd;
    --shell-text-soft: #9aa0a6;
  }

  * { box-sizing: border-box; }

  html, body { margin: 0; min-height: 100%; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--shell-bg);
    color: var(--shell-text);
    padding: 40px 20px 60px;
  }

  .wrap { max-width: 920px; margin: 0 auto; }

  header {
    text-align: center;
    margin-bottom: 30px;
  }

  header h1 {
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 40px;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  header h1 span { color: var(--redpen); }

  header p {
    font-size: 13px;
    color: var(--shell-text-soft);
    margin: 0;
    letter-spacing: 0.02em;
  }

  .modes {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 22px;
  }

  .mode-chip {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid var(--shell-edge);
    background: transparent;
    color: var(--shell-text-soft);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .mode-chip:hover { border-color: var(--teal); color: var(--shell-text); }
  .mode-chip.selected {
    background: var(--teal);
    border-color: var(--teal);
    color: #f4f8f6;
  }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .panel {
    background: var(--paper);
    border: 1px solid var(--paper-edge);
    border-radius: 10px;
    padding: 18px;
    color: var(--ink);
    position: relative;
    overflow: hidden;
    min-height: 340px;
    display: flex;
    flex-direction: column;
  }

  .panel-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  textarea {
    flex: 1;
    width: 100%;
    resize: none;
    border: none;
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--ink);
    padding: 0;
  }
  textarea::placeholder { color: var(--ink-soft); }
  textarea:focus { outline: none; }

  .word-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
  }

  .generate-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 12px;
  }

  .generate-btn {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    border: none;
    background: var(--redpen);
    color: #fdf3f1;
    padding: 10px 20px;
    border-radius: 100px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .generate-btn:hover { background: #a52f24; }
  .generate-btn:active { transform: scale(0.96); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Signature: scanning pen line during processing */
  .scan-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--redpen) 20%, var(--redpen) 80%, transparent);
    top: 0;
    opacity: 0;
    box-shadow: 0 0 8px 1px rgba(194,59,46,0.5);
  }
  .panel.scanning .scan-line {
    opacity: 1;
    animation: scan 1.1s ease-in-out infinite;
  }
  @keyframes scan {
    0% { top: 0%; }
    50% { top: 96%; }
    100% { top: 0%; }
  }

  .output-body {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13.5px;
    line-height: 1.6;
    white-space: pre-wrap;
    overflow-y: auto;
  }

  .output-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--ink-soft);
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-size: 16px;
    padding: 0 20px;
  }

  .output-error {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--redpen);
    font-size: 13px;
    padding: 0 16px;
  }

  .edited-tag {
    position: absolute;
    top: 14px;
    right: 16px;
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--redpen);
    border: 1px solid var(--redpen);
    border-radius: 100px;
    padding: 2px 10px;
    opacity: 0;
    transform: rotate(-4deg) scale(0.9);
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
  }
  .panel.done .edited-tag { opacity: 0.9; transform: rotate(-4deg) scale(1); }

  .copy-btn {
    background: none;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--teal);
    cursor: pointer;
    text-decoration: underline;
  }
  .copy-btn:hover { color: var(--teal-hi); }

  .footer-note {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--shell-text-soft);
    margin-top: 22px;
  }

  @media (max-width: 720px) {
    .panels { grid-template-columns: 1fr; }
    header h1 { font-size: 32px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>Red<span>line</span></h1>
    <p>Paste text, pick an edit, watch it get marked up</p>
  </header>

  <div class="modes" id="modes">
    <button class="mode-chip selected" data-mode="summarize">Summarize</button>
    <button class="mode-chip" data-mode="simplify">Simplify</button>
    <button class="mode-chip" data-mode="professional">Make professional</button>
    <button class="mode-chip" data-mode="bullets">Bullet points</button>
    <button class="mode-chip" data-mode="grammar">Fix grammar</button>
    <button class="mode-chip" data-mode="expand">Expand</button>
  </div>

  <div class="panels">
    <div class="panel" id="inputPanel">
      <div class="scan-line"></div>
      <div class="panel-label">
        <span>Original</span>
        <span class="word-count" id="wordCount">0 words</span>
      </div>
      <textarea id="inputText" placeholder="Paste a paragraph, an email, or some notes here…"></textarea>
      <div class="generate-row">
        <button class="generate-btn" id="generateBtn">Edit it</button>
      </div>
    </div>

    <div class="panel" id="outputPanel">
      <div class="edited-tag">edited</div>
      <div class="panel-label">
        <span>Result</span>
        <button class="copy-btn" id="copyBtn" style="display:none;">Copy</button>
      </div>
      <div class="output-empty" id="outputContent">Nothing marked up yet.</div>
    </div>
  </div>

  <div class="footer-note" id="footerNote">powered by the Claude API</div>
</div>

<script>
(function () {
  const inputText = document.getElementById('inputText');
  const wordCount = document.getElementById('wordCount');
  const generateBtn = document.getElementById('generateBtn');
  const inputPanel = document.getElementById('inputPanel');
  const outputPanel = document.getElementById('outputPanel');
  const outputContent = document.getElementById('outputContent');
  const copyBtn = document.getElementById('copyBtn');
  const modesWrap = document.getElementById('modes');

  let selectedMode = 'summarize';

  const modePrompts = {
    summarize: 'Summarize the following text in 2-4 concise sentences, keeping the key facts and meaning intact. Return only the summary, no preamble.',
    simplify: 'Rewrite the following text in simpler, plainer language so it is easy for anyone to understand. Keep the meaning intact. Return only the rewritten text, no preamble.',
    professional: 'Rewrite the following text in a clear, professional, business-appropriate tone. Return only the rewritten text, no preamble.',
    bullets: 'Convert the key points of the following text into a clean, concise bulleted list. Return only the bullet list, no preamble.',
    grammar: 'Fix all grammar, spelling, and punctuation errors in the following text without changing its meaning or tone. Return only the corrected text, no preamble.',
    expand: 'Expand the following text with more detail and supporting context, roughly doubling its length while staying on topic. Return only the expanded text, no preamble.'
  };

  function updateWordCount() {
    const words = inputText.value.trim().split(/\s+/).filter(Boolean).length;
    wordCount.textContent = words + (words === 1 ? ' word' : ' words');
  }
  inputText.addEventListener('input', updateWordCount);

  modesWrap.addEventListener('click', (e) => {
    const btn = e.target.closest('.mode-chip');
    if (!btn) return;
    document.querySelectorAll('.mode-chip').forEach(c => c.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMode = btn.dataset.mode;
  });

  async function runEdit() {
    const text = inputText.value.trim();
    if (!text) {
      inputText.focus();
      return;
    }

    generateBtn.disabled = true;
    inputPanel.classList.add('scanning');
    outputPanel.classList.remove('done');
    outputContent.className = 'output-empty';
    outputContent.textContent = 'Marking it up…';
    copyBtn.style.display = 'none';

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [
            { role: 'user', content: `${modePrompts[selectedMode]}\n\n---\n\n${text}` }
          ]
        })
      });

      if (!response.ok) throw new Error('api-error');
      const data = await response.json();
      const resultText = (data.content || [])
        .map(block => block.type === 'text' ? block.text : '')
        .join('\n')
        .trim();

      if (!resultText) throw new Error('empty-response');

      outputContent.className = 'output-body';
      outputContent.textContent = resultText;
      copyBtn.style.display = 'inline';
      outputPanel.classList.add('done');
    } catch (err) {
      outputContent.className = 'output-error';
      outputContent.textContent = 'Could not reach the AI service. Check your connection and try again.';
    } finally {
      generateBtn.disabled = false;
      inputPanel.classList.remove('scanning');
    }
  }

  generateBtn.addEventListener('click', runEdit);

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(outputContent.textContent).then(() => {
      copyBtn.textContent = 'Copied';
      setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
    });
  });

  updateWordCount();
})();
</script>

</body>
</html>
